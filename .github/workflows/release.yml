name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.platform_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
            platform_tag: win-x64
            is_win: true
          - os: macos-latest # Apple Silicon Mac
            platform: macos-arm64
            platform_tag: mac-AppleSilicon
          # - os: macos-15-intel # Intel Mac
          #   platform: macos-x86_64
          #   platform_tag: mac-Intel

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Extract Version from Tag
        shell: bash
        run: |
          # 将 v1.13.5 转换为 1.13.5
          VERSION=${GITHUB_REF_NAME#v}
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "BASENAME=MediaTools-v$VERSION-${{ matrix.platform_tag }}" >> $GITHUB_ENV

      # --- 平台差异化准备步骤 ---
      - name: Set up NSIS (Windows)
        if: matrix.is_win
        run: choco install nsis -y

      # --- Nuitka 构建步骤 ---

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka AssetsManager.py

      - name: Build with Nuitka (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m nuitka --macos-app-version=${{ env.APP_VERSION }} AssetsManager.py

      # --- 拷贝依赖库 ---

          
      # --- 打包安装程序 ---
      - name: Build Installer (Windows)
        if: matrix.is_win
        run: |
          ls dist-nuitka/AssetsManager.dist
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            /DVERSION="${{ env.APP_VERSION }}" `
            /DOUTFILE="${{ env.BASENAME }}.exe" `
            installer.nsi
  
      # --- 统一打包逻辑 (已移除冗余，修复 mkdir) ---
      - name: Final Package
        shell: bash
        run: |
          mkdir -p out
          
          if [ "${{ runner.os }}" == "Windows" ]; then
            powershell.exe -Command "Compress-Archive -Path 'dist-nuitka/AssetsManager.dist/*' -DestinationPath 'out/${{ env.BASENAME }}.zip' -Force"
            
            if [ -f "${{ env.BASENAME }}.exe" ]; then
              mv "${{ env.BASENAME }}.exe" out/
            fi
          else
            mkdir -p dist-dmg
            cp -R dist-nuitka/AssetsManager.app dist-dmg/
            ln -s /Applications dist-dmg/Applications
            hdiutil create -srcfolder dist-dmg \
                           -volname "AssetsManager" \
                           -format UDZO \
                           -ov \
                           "out/${{ env.BASENAME }}.dmg"
          fi

      - name: Debug Output
        shell: bash
        run: |
          echo "Checking out directory content:"
          ls -R out/

      # --- 新增：上传产物 ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.platform_tag }}
          path: out/*

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          # 不指定 name 会下载所有 artifact
          path: release-dist
          merge-multiple: true

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'release-dist/*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 修正：添加了 .dmg 并确保路径正确
          files: |
            release-dist/*.zip
            release-dist/*.exe
            release-dist/*.dmg
          generate_release_notes: true