name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: AssetsManager-macos.zip
            dist_path: dist-nuitka/AssetsManager.app
          - os: windows-latest
            artifact_name: AssetsManager-windows.zip
            dist_path: dist-nuitka/AssetsManager.dist

    runs-on: ${{ matrix.os }}
    
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka zstandard

      - name: Build with Nuitka (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m nuitka AssetsManager.py
          mkdir -p dist_final
          zip -r dist_final/${{ matrix.artifact_name }} dist-nuitka/AssetsManager.app

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka AssetsManager.py
          mkdir dist_final
          powershell Compress-Archive -Path dist-nuitka/AssetsManager.dist/* -DestinationPath dist_final/${{ matrix.artifact_name }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist_final/*'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist_final/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true